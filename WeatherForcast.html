<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Forecast</title>
    <style>
        :root {
            --primary: #1e3a8a;
            --accent: #2563eb;
            --background: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #0f172a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            margin: 0;
            padding: 50px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .utility-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        h1 {
            color: var(--primary);
            font-size: 24px;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 8px;
        }

        p.description {
            color: #64748b;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        #locationInput {
            flex: 1;
            padding: 12px 16px;
            font-size: 14px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            background-color: #f8fafc;
            color: var(--text-main);
            transition: border-color 0.2s ease;
        }

        #locationInput:focus {
            outline: none;
            border-color: var(--accent);
            background-color: #ffffff;
        }

        .action-btn {
            background-color: var(--accent);
            color: #ffffff;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }

        .action-btn:hover {
            background-color: #1d4ed8;
            transform: translateY(-1px);
        }

        .action-btn:active {
            transform: translateY(1px);
        }

        #logStatus {
            margin-top: 25px;
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            line-height: 1.4;
            display: none;
            text-align: left;
        }

        .processing { 
            background-color: #fef3c7; 
            color: #92400e; 
            border: 1px solid #fde68a; 
        }
        
        .success { 
            background-color: #dcfce7; 
            color: #166534; 
            border: 1px solid #bbf7d0; 
        }
        
        .error { 
            background-color: #fee2e2; 
            color: #991b1b; 
            border: 1px solid #fecaca; 
        }

        .weather-data {
            margin-top: 30px;
            text-align: left;
            display: none;
        }

        .weather-data.show {
            display: block;
        }

        .weather-card {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .weather-card h2 {
            margin: 0 0 15px 0;
            font-size: 20px;
        }

        .weather-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }

        .info-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 6px;
            backdrop-filter: blur(10px);
        }

        .info-label {
            font-size: 12px;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 18px;
            font-weight: 700;
        }

        .condition-info {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            margin-bottom: 15px;
        }

        .condition-icon {
            font-size: 48px;
        }

        .condition-text {
            flex: 1;
        }

        .condition-text .text {
            font-size: 16px;
            font-weight: 600;
        }

        .condition-text .temp {
            font-size: 24px;
            font-weight: 700;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="utility-card">
        <h1>Weather Forecast</h1>
        <p class="description">
            Fetching weather information from public API.
        </p>
        
        <div class="input-group">
            <input 
                type="text" 
                id="locationInput" 
                placeholder="Enter city name (e.g., London, New York, Tokyo)"
            />
            <button id="executeApiBtn" class="action-btn">Get Weather</button>
        </div>

        <div id="logStatus"></div>

        <div id="weatherData" class="weather-data">
            <div class="weather-card">
                <h2 id="locationName"></h2>
                
                <div class="condition-info">
                    <div class="condition-icon" id="weatherIcon"></div>
                    <div class="condition-text">
                        <div class="text" id="weatherCondition"></div>
                        <div class="temp" id="temperature"></div>
                    </div>
                </div>

                <div class="weather-info">
                    <div class="info-item">
                        <div class="info-label">Feels Like</div>
                        <div class="info-value" id="feelsLike"></div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Humidity</div>
                        <div class="info-value" id="humidity"></div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Wind Speed</div>
                        <div class="info-value" id="windSpeed"></div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Pressure</div>
                        <div class="info-value" id="pressure"></div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Visibility</div>
                        <div class="info-value" id="visibility"></div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">UV Index</div>
                        <div class="info-value" id="uvIndex"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = '217cb95479854c308ac145316262405';

        function getWeatherIcon(condition) {
            const conditionText = condition.toLowerCase();
            if (conditionText.includes('sunny') || conditionText.includes('clear')) return '☀️';
            if (conditionText.includes('cloud')) return '☁️';
            if (conditionText.includes('rain')) return '🌧️';
            if (conditionText.includes('snow')) return '❄️';
            if (conditionText.includes('thunder') || conditionText.includes('storm')) return '⛈️';
            if (conditionText.includes('mist') || conditionText.includes('fog')) return '🌫️';
            return '🌤️';
        }

        function fetchWeather(location) {
            const apiUrl = `https://api.weatherapi.com/v1/current.json?key=${API_KEY}&q=${encodeURIComponent(location)}&aqi=yes`;
            const statusBox = document.getElementById('logStatus');
            const weatherDataDiv = document.getElementById('weatherData');

            statusBox.style.display = 'block';
            statusBox.className = 'processing';
            statusBox.innerText = `Fetching weather for "${location}"...`;
            weatherDataDiv.classList.remove('show');

            fetch(apiUrl)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`Location not found or API error: ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    displayWeatherData(data);
                    statusBox.style.display = 'none';
                    weatherDataDiv.classList.add('show');
                })
                .catch(error => {
                    console.error('API Error:', error);
                    statusBox.className = 'error';
                    statusBox.innerText = `Error: ${error.message}. Please check the location name and try again.`;
                    weatherDataDiv.classList.remove('show');
                });
        }

        function displayWeatherData(data) {
            const current = data.current;
            const location = data.location;

            document.getElementById('locationName').innerText = `${location.name}, ${location.country}`;
            document.getElementById('weatherCondition').innerText = current.condition.text;
            document.getElementById('weatherIcon').innerText = getWeatherIcon(current.condition.text);
            document.getElementById('temperature').innerText = `${current.temp_c}°C (${current.temp_f}°F)`;
            document.getElementById('feelsLike').innerText = `${current.feelslike_c}°C`;
            document.getElementById('humidity').innerText = `${current.humidity}%`;
            document.getElementById('windSpeed').innerText = `${current.wind_kph} km/h`;
            document.getElementById('pressure').innerText = `${current.pressure_mb} mb`;
            document.getElementById('visibility').innerText = `${current.vis_km} km`;
            document.getElementById('uvIndex').innerText = `${current.uv}`;
        }

        document.getElementById('executeApiBtn').addEventListener('click', () => {
            const location = document.getElementById('locationInput').value.trim();
            if (location) {
                fetchWeather(location);
            } else {
                document.getElementById('logStatus').style.display = 'block';
                document.getElementById('logStatus').className = 'error';
                document.getElementById('logStatus').innerText = 'Please enter a city name.';
            }
        });

        document.getElementById('locationInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('executeApiBtn').click();
            }
        });
    </script>
</body>
</html>
